<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<script>(function(){var t=localStorage.getItem('fitness-theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健身热量日报</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  /* ===== Dark theme (default) ===== */
  :root, [data-theme="dark"] {
    --bg: #1c1c1e;
    --bg-card: #2c2c2e;
    --bg-inner: #1c1c1e;
    --text: #fafafa;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    --border: #27272a;
    --border-strong: #3f3f46;
    --accent-red: #ff375f;
    --accent-green: #34c759;
    --accent-blue: #00c7be;
    --accent-orange: #ff9f0a;
    --accent-purple: #7c3aed;
    --accent-teal: #14b8a6;
    --glow-red: rgba(255, 55, 95, 0.4);
    --glow-green: rgba(52, 199, 89, 0.35);
    --glow-blue: rgba(0, 199, 190, 0.35);
    --glow-orange: rgba(255, 159, 10, 0.35);
    --glow-purple: rgba(124, 58, 237, 0.4);
    --badge-text-white: #ffffff;
    --chart-grid: #27272a;
    --chart-tooltip-bg: #1c1c1e;
    --chart-tooltip-text: #fafafa;
    --shadow-card: rgba(0,0,0,0.35);
    --shadow-card-hover: rgba(0,0,0,0.45);
    --protein-ring-bg: #3f3f46;
    --theme-icon-fill: #fafafa;
    --theme-btn-bg: rgba(255,255,255,0.08);
    --theme-btn-hover: rgba(255,255,255,0.16);
  }

  /* ===== Light theme ===== */
  [data-theme="light"] {
    --bg: #f5f5f7;
    --bg-card: #ffffff;
    --bg-inner: #f0f0f2;
    --text: #1c1c1e;
    --text-secondary: #6e6e73;
    --text-muted: #8e8e93;
    --border: #e5e5ea;
    --border-strong: #d1d1d6;
    --accent-red: #e5243d;
    --accent-green: #248a3d;
    --accent-blue: #009e96;
    --accent-orange: #cc7a00;
    --accent-purple: #6d28d9;
    --accent-teal: #0f9488;
    --glow-red: rgba(229, 36, 61, 0.25);
    --glow-green: rgba(36, 138, 61, 0.2);
    --glow-blue: rgba(0, 158, 150, 0.2);
    --glow-orange: rgba(204, 122, 0, 0.2);
    --glow-purple: rgba(109, 40, 217, 0.25);
    --badge-text-white: #1c1c1e;
    --chart-grid: #e5e5ea;
    --chart-tooltip-bg: #ffffff;
    --chart-tooltip-text: #1c1c1e;
    --shadow-card: rgba(0,0,0,0.06);
    --shadow-card-hover: rgba(0,0,0,0.12);
    --protein-ring-bg: #e5e5ea;
    --theme-icon-fill: #1c1c1e;
    --theme-btn-bg: rgba(0,0,0,0.06);
    --theme-btn-hover: rgba(0,0,0,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Space Grotesk", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  /* Theme toggle */
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 8px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--theme-btn-bg);
    transition: background 0.2s, border-color 0.3s;
    user-select: none;
    font-family: "Noto Sans SC", sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .theme-toggle:hover { background: var(--theme-btn-hover); }
  .theme-toggle svg {
    width: 18px; height: 18px;
    fill: var(--theme-icon-fill);
    transition: transform 0.4s, fill 0.3s;
  }
  .theme-toggle:hover svg { transform: rotate(30deg); }
  [data-theme="light"] .theme-toggle svg { transform: rotate(0deg); }
  [data-theme="light"] .theme-toggle:hover svg { transform: rotate(-30deg); }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left { display: flex; flex-direction: column; gap: 4px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header h1 {
    font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    text-shadow: 0 0 20px var(--glow-green);
    transition: text-shadow 0.3s;
  }
  [data-theme="light"] .header h1 { text-shadow: none; }
  .header .date { color: var(--text-secondary); font-size: 15px; font-family: "Noto Sans SC", sans-serif; }
  .header .goal-badge {
    padding: 6px 18px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 700;
    font-family: "Noto Sans SC", sans-serif;
    color: var(--badge-text-white);
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  }
  .goal-badge.cut { background: rgba(0, 199, 190, 0.15); border: 1px solid rgba(0, 199, 190, 0.5); box-shadow: 0 0 16px rgba(0, 199, 190, 0.25), inset 0 0 8px rgba(0, 199, 190, 0.15); }
  .goal-badge.bulk { background: rgba(255, 143, 62, 0.15); border: 1px solid rgba(255, 143, 62, 0.5); box-shadow: 0 0 16px rgba(255, 143, 62, 0.25), inset 0 0 8px rgba(255, 143, 62, 0.15); }
  .goal-badge.maintain { background: rgba(48, 209, 88, 0.15); border: 1px solid rgba(48, 209, 88, 0.5); box-shadow: 0 0 16px rgba(48, 209, 88, 0.25), inset 0 0 8px rgba(48, 209, 88, 0.15); }

  /* Stat cards */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--bg-card);
    border-radius: 14px;
    padding: 20px;
    box-shadow: 0 4px 16px var(--shadow-card);
    border: 1px solid var(--border);
    transition: box-shadow 0.15s, background 0.3s, border-color 0.3s;
  }
  .stat-card:hover { box-shadow: 0 8px 24px var(--shadow-card-hover); }
  .stat-card .label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; font-family: "Noto Sans SC", sans-serif; transition: color 0.3s; }
  .stat-card .value { font-size: 34px; font-weight: 700; line-height: 1.1; font-family: "Space Grotesk", "IBM Plex Sans", sans-serif; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; transition: color 0.3s, text-shadow 0.3s; }
  .stat-card .unit { font-size: 14px; font-weight: 400; color: var(--text-muted); margin-left: 2px; transition: color 0.3s; }
  .stat-card .sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; font-family: "Noto Sans SC", sans-serif; transition: color 0.3s; }
  .stat-card.highlight .value { color: var(--text); text-shadow: 0 0 6px var(--glow-blue); }
  [data-theme="light"] .stat-card.highlight .value { text-shadow: none; }
  .stat-card.deficit-negative .value { color: var(--accent-green); }
  .stat-card.deficit-positive .value { color: var(--accent-orange); }
  .stat-card.protein-good .value { color: var(--accent-green); }
  .stat-card.protein-warn .value { color: var(--accent-orange); }
  .stat-card.protein-bad .value { color: var(--accent-red); }
  .stat-card.weight .value { color: var(--accent-orange); }
  .stat-card.bodyfat .value { color: var(--accent-purple); }
  [data-theme="light"] .stat-card .value { text-shadow: none; }

  /* Chart grid */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 768px) { .chart-grid { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--bg-card);
    border-radius: 14px;
    padding: 24px;
    box-shadow: 0 4px 16px var(--shadow-card);
    border: 1px solid var(--border);
    transition: background 0.3s, border-color 0.3s;
  }
  .chart-card h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 16px;
    font-family: "Noto Sans SC", sans-serif;
    color: var(--text);
    transition: color 0.3s;
  }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-wrapper { position: relative; height: 180px; }
  .chart-wrapper.tall { height: 220px; }

  /* Protein progress */
  .protein-section { display: flex; align-items: center; gap: 24px; }
  .protein-ring {
    position: relative;
    width: 140px;
    height: 140px;
    flex-shrink: 0;
  }
  .protein-ring svg { transform: rotate(-90deg); }
  .protein-ring .center {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    text-align: center;
  }
  .protein-ring .center .pct { font-size: 28px; font-weight: 700; font-family: "Space Grotesk", sans-serif; font-variant-numeric: tabular-nums; }
  .protein-ring .center .lbl { font-size: 12px; color: var(--text-muted); font-family: "Noto Sans SC", sans-serif; }
  .protein-info { flex: 1; }
  .protein-info .row {
    display: flex;
    justify-content: space-between;
    padding: 7px 0;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    transition: border-color 0.3s;
  }
  .protein-info .row:last-child { border-bottom: none; }
  .protein-info .row .v { font-weight: 700; font-family: "Space Grotesk", sans-serif; font-variant-numeric: tabular-nums; }

  /* Exercise table */
  .exercise-table { width: 100%; border-collapse: collapse; }
  .exercise-table th {
    text-align: left;
    font-size: 13px;
    color: var(--text-muted);
    padding: 10px 12px;
    border-bottom: 2px solid var(--border-strong);
    font-weight: 500;
    font-family: "Noto Sans SC", sans-serif;
    transition: color 0.3s, border-color 0.3s;
  }
  .exercise-table td {
    padding: 12px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    transition: border-color 0.3s;
  }
  .exercise-table tr:last-child td { border-bottom: none; }
  .exercise-table .calories { font-weight: 700; color: var(--text); font-family: "Space Grotesk", sans-serif; }
  .exercise-table tr.total td { padding-top: 14px; border-top: 2px solid var(--border-strong); font-weight: 700; color: var(--text); }
  .met-badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    font-family: "Space Grotesk", sans-serif;
    background: var(--glow-purple);
    color: var(--accent-purple);
    transition: background 0.3s, color 0.3s;
  }
  .met-badge.red { background: var(--glow-red); color: var(--accent-red); }
  .met-badge.green { background: var(--glow-green); color: var(--accent-green); }
  .met-badge.blue { background: var(--glow-blue); color: var(--accent-blue); }
  .met-badge.orange { background: var(--glow-orange); color: var(--accent-orange); }

  /* Footer */
  .footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    padding-top: 16px;
    font-family: "Noto Sans SC", sans-serif;
    transition: color 0.3s;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>健身热量日报</h1>
      <span class="date" id="date-text"></span>
    </div>
    <div class="header-right">
      <span class="goal-badge" id="goal-badge"></span>
      <button class="theme-toggle" id="theme-toggle" title="切换明暗主题">

        <svg id="icon-sun" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V4a1 1 0 0 1 1-1zm0 15a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1zm8.66-5a1 1 0 0 1 0 2h-1a1 1 0 1 1 0-2h1zm-15 0a1 1 0 0 1 0 2h-1a1 1 0 1 1 0-2h1zM19.07 4.93a1 1 0 0 1 0 1.41l-.7.71a1 1 0 1 1-1.42-1.42l.71-.7a1 1 0 0 1 1.41 0zM7.05 16.95a1 1 0 0 1 0 1.41l-.7.71a1 1 0 1 1-1.42-1.42l.71-.7a1 1 0 0 1 1.41 0zm12.02 0a1 1 0 0 1-1.41 0l-.71-.7a1 1 0 1 1 1.42-1.42l.7.71a1 1 0 0 1 0 1.41zM7.05 4.93a1 1 0 0 1 1.41 0l.71.7a1 1 0 1 1-1.42 1.42l-.7-.71a1 1 0 0 1 0-1.41zM12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm0-2a6 6 0 1 1 0 12 6 6 0 0 1 0-12z"/>
        </svg>
        <!-- Moon icon (shown in light mode, click to go dark) -->
        <svg id="icon-moon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
          <path d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21c2.492 0 4.768-.938 6.502-2.498z"/>
        </svg>
        <span id="theme-label">日间</span>

    </div>

  <!-- Stat cards -->
  <div class="stat-grid" id="stat-grid"></div>

  <!-- Charts -->
  <div class="chart-grid">

    <div class="chart-card">
      <h3>TDEE 三层拆解</h3>
      <div class="chart-wrapper"><canvas id="tdee-chart"></canvas></div>
    </div>

    <!-- Intake vs TDEE -->
    <div class="chart-card">
      <h3>摄入 vs 消耗</h3>
      <div class="chart-wrapper"><canvas id="balance-chart"></canvas></div>
    </div>

    <!-- Meal Distribution -->
    <div class="chart-card">
      <h3>餐次热量分布</h3>
      <div class="chart-wrapper"><canvas id="meal-chart"></canvas></div>
    </div>

    <!-- Protein Progress -->
    <div class="chart-card">
      <h3>蛋白质达成</h3>
      <div class="protein-section" id="protein-section"></div>
    </div>

    <!-- Exercise Table -->
    <div class="chart-card full">
      <h3>运动消耗明细</h3>
      <table class="exercise-table">
        <thead>
          <tr>
            <th>运动类型</th>
            <th>MET</th>
            <th>时长</th>
            <th>消耗 (kcal)</th>
          </tr>
        </thead>
        <tbody id="exercise-tbody"></tbody>
      </table>
    </div>
  </div>

  <div class="footer">
    Generated by Fitness Tracker Skill | 数据仅供参考，实际消耗因人而异
  </div>
</div>

<script>
(function() {
  if (typeof Chart === 'undefined') {
    document.body.innerHTML = '<div style="padding:60px;text-align:center;font-family:&quot;Noto Sans SC&quot;,sans-serif;color:var(--text)"><h2>⚠️ 图表库加载失败</h2><p>请检查网络连接后刷新页面</p></div>';
    return;
  }
  const raw = document.getElementById('dashboard-data').textContent;
  const D = JSON.parse(raw);

  /* ===== Theme system ===== */
  const html = document.documentElement;
  const saved = localStorage.getItem('fitness-theme');
  if (saved) html.setAttribute('data-theme', saved);

  function themeColors() {
    const dark = html.getAttribute('data-theme') === 'dark';
    return {
      grid: dark ? '#27272a' : '#e5e5ea',
      tick: dark ? '#71717a' : '#8e8e93',
      legend: dark ? '#a1a1aa' : '#6e6e73',
      tooltipBg: dark ? '#1c1c1e' : '#ffffff',
      tooltipText: dark ? '#fafafa' : '#1c1c1e',
      tooltipBorder: dark ? '#3f3f46' : '#d1d1d6',
      pointBorder: dark ? '#fff' : '#1c1c1e'
    };
  }

  function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }
  function cssAlpha(name, alpha) {
    return cssVar(name).replace('rgb(', 'rgba(').replace(')', `, ${alpha})`);
  }

  function updateToggleUI() {
    const isDark = html.getAttribute('data-theme') === 'dark';
    document.getElementById('icon-sun').style.display = isDark ? '' : 'none';
    document.getElementById('icon-moon').style.display = isDark ? 'none' : '';
    document.getElementById('theme-label').textContent = isDark ? '日间' : '夜间';
  }
  updateToggleUI();

  document.getElementById('theme-toggle').addEventListener('click', function() {
    const current = html.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    try { localStorage.setItem('fitness-theme', next); } catch(e) {}
    updateToggleUI();
    refreshCharts();
  });

  /* ===== Header ===== */
  document.getElementById('date-text').textContent = D.date;
  const badge = document.getElementById('goal-badge');
  badge.textContent = D.goal;
  badge.className = 'goal-badge ' + (D.goalType || 'cut');

  /* ===== Stat cards ===== */
  const s = D.stats;
  const proteinPct = s.proteinTarget > 0 ? Math.min(100, Math.round(s.protein / s.proteinTarget * 100)) : 0;
  let proteinClass = 'protein-good';
  if (proteinPct < 80) proteinClass = 'protein-bad';
  else if (proteinPct < 100) proteinClass = 'protein-warn';

  let deficitClass = 'deficit-negative';
  if (s.deficit > 0) deficitClass = 'deficit-positive';

  const deficitLabel = s.deficit < 0 ? '赤字' : (s.deficit > 0 ? '盈余' : '持平');

  const cards = [
    { label: 'TDEE 日消耗', value: s.tdee, unit: ' kcal', sub: `BMR ${s.bmr} (${s.bmrSource})`, cls: 'highlight' },
    { label: '全天摄入', value: s.intake, unit: ' kcal', sub: `${D.meals.length} 餐`, cls: '' },
    { label: `热量${deficitLabel}`, value: (s.deficit > 0 ? '+' : '') + s.deficit, unit: ' kcal', sub: deficitLabel, cls: deficitClass },
    { label: '蛋白质', value: s.protein, unit: ` / ${s.proteinTarget}g`, sub: `${proteinPct}%`, cls: proteinClass },
    { label: '步数', value: s.steps.toLocaleString(), unit: ' 步', sub: `NEAT ~${Math.round(s.steps * 45 / 1000)} kcal`, cls: '' },
    { label: '体重', value: s.weight != null ? s.weight : '—', unit: s.weight != null ? ' kg' : '', sub: '最新记录', cls: 'weight' },
    { label: '体脂率', value: s.bodyFat != null ? s.bodyFat : '—', unit: s.bodyFat != null ? '%' : '', sub: s.bodyFat != null ? 'InBody 实测' : '数据不足', cls: 'bodyfat' }
  ];

  const grid = document.getElementById('stat-grid');
  cards.forEach(c => {
    const div = document.createElement('div');
    div.className = 'stat-card ' + c.cls;
    div.innerHTML = `<div class="label">${c.label}</div><div class="value">${c.value}<span class="unit">${c.unit}</span></div><div class="sub">${c.sub}</div>`;
    grid.appendChild(div);
  });

  /* ===== Chart instances store ===== */
  let chartInstances = {};

  function makeTooltip() {
    const c = themeColors();
    return {
      backgroundColor: c.tooltipBg,
      titleColor: c.tooltipText,
      bodyColor: c.tooltipText,
      borderColor: c.tooltipBorder,
      borderWidth: 1,
      padding: 10,
      cornerRadius: 8
    };
  }

  function refreshCharts() {
    const c = themeColors();
    // Destroy old charts
    Object.values(chartInstances).forEach(ch => ch.destroy());
    chartInstances = {};

    // Rebuild
    Chart.defaults.color = c.legend;
    Chart.defaults.borderColor = c.grid;

    // 1. TDEE Breakdown
    const tdeeData = D.tdeeBreakdown;
    chartInstances.tdee = new Chart(document.getElementById('tdee-chart'), {
      type: 'bar',
      data: {
        labels: ['TDEE'],
        datasets: tdeeData.labels.map((label, i) => ({
          label: label,
          data: [tdeeData.values[i]],
          backgroundColor: [cssVar('--accent-purple'), cssVar('--accent-blue'), cssVar('--accent-orange')][i],
          borderRadius: 6,
          barPercentage: 0.5
        }))
      },
      options: {
        indexAxis: 'y',
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { color: c.legend, boxWidth: 12, padding: 12, font: { size: 12 } } },
          tooltip: Object.assign({}, makeTooltip(), { callbacks: { label: ctx => `${ctx.dataset.label}: ${ctx.raw} kcal` } })
        },
        scales: {
          x: { stacked: true, grid: { color: c.grid }, ticks: { color: c.tick, font: { size: 12 } } },
          y: { stacked: true, grid: { display: false }, ticks: { color: c.legend, font: { size: 12 } } }
        }
      }
    });

    // 2. Intake vs TDEE
    chartInstances.balance = new Chart(document.getElementById('balance-chart'), {
      type: 'bar',
      data: {
        labels: ['日消耗 TDEE', '全天摄入'],
        datasets: [{
          data: [s.tdee, s.intake],
          backgroundColor: [cssVar('--accent-purple'), cssVar('--accent-green')],
          borderRadius: 8,
          barPercentage: 0.5
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: Object.assign({}, makeTooltip(), { callbacks: { label: ctx => `${ctx.raw} kcal` } })
        },
        scales: {
          y: { beginAtZero: true, grid: { color: c.grid }, ticks: { color: c.tick, font: { size: 12 } } },
          x: { grid: { display: false }, ticks: { color: c.legend, font: { size: 13, weight: '700' } } }
        }
      }
    });

    // 3. Meal Distribution
    const mealColors = [cssVar('--accent-orange'), cssVar('--accent-purple'), cssVar('--accent-blue'), cssVar('--accent-teal'), cssVar('--accent-red')];
    chartInstances.meal = new Chart(document.getElementById('meal-chart'), {
      type: 'doughnut',
      data: {
        labels: D.meals.map(m => m.name),
        datasets: [{
          data: D.meals.map(m => m.calories),
          backgroundColor: mealColors.slice(0, D.meals.length),
          borderWidth: 0,
          hoverOffset: 6
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        cutout: '60%',
        plugins: {
          legend: { position: 'bottom', labels: { color: c.legend, boxWidth: 12, padding: 10, font: { size: 12 } } },
          tooltip: Object.assign({}, makeTooltip(), {
            callbacks: {
              label: ctx => {
                const total = ctx.dataset.data.reduce((a, b) => a + b, 0);
                const pct = total > 0 ? Math.round(ctx.raw / total * 100) : 0;
                return `${ctx.label}: ${ctx.raw} kcal (${pct}%)`;
              }
            }
          })
        }
      }
    });
  }

  /* ===== Protein ring (static, theme-aware via CSS vars) ===== */
  const ringSection = document.getElementById('protein-section');
  const pct = Math.min(proteinPct, 100);
  const circumference = 2 * Math.PI * 52;
  const offset = circumference - (pct / 100) * circumference;
  let ringColor = cssVar('--accent-green');
  if (proteinPct < 80) ringColor = cssVar('--accent-red');
  else if (proteinPct < 100) ringColor = cssVar('--accent-orange');

  const metBadge = (met) => {
    if (met >= 10) return 'red';
    if (met >= 7) return 'orange';
    if (met >= 4) return 'blue';
    return 'green';
  };

  ringSection.innerHTML = `
    <div class="protein-ring">
      <svg width="140" height="140">
        <circle cx="70" cy="70" r="52" fill="none" stroke="var(--protein-ring-bg)" stroke-width="12"/>
        <circle cx="70" cy="70" r="52" fill="none" stroke="${ringColor}" stroke-width="12"
          stroke-dasharray="${circumference}" stroke-dashoffset="${offset}"
          stroke-linecap="round" style="transition: stroke-dashoffset 0.8s ease;"/>
      </svg>
      <div class="center">
        <div class="pct" style="color:${ringColor}">${proteinPct}%</div>
        <div class="lbl">达成率</div>
      </div>
    </div>
    <div class="protein-info">
      <div class="row"><span>实际摄入</span><span class="v">${s.protein} g</span></div>
      <div class="row"><span>每日目标</span><span class="v">${s.proteinTarget} g</span></div>
      <div class="row"><span>差距</span><span class="v" style="color:${ringColor}">${s.protein - s.proteinTarget > 0 ? '+' : ''}${s.protein - s.proteinTarget} g</span></div>
      <div class="row"><span>每公斤体重</span><span class="v">${s.weight != null && s.weight > 0 ? (s.protein / s.weight).toFixed(1) + ' g/kg' : '—'}</span></div>
    </div>
  `;

  /* ===== Exercise Table ===== */
  const tbody = document.getElementById('exercise-tbody');
  D.exercises.forEach(ex => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${ex.type}</td>
      <td><span class="met-badge ${metBadge(ex.met)}">${ex.met}</span></td>
      <td>${ex.duration} 分钟</td>
      <td class="calories">~${ex.calories} kcal</td>
    `;
    tbody.appendChild(tr);
  });

  const totalEx = D.exercises.reduce((sum, ex) => sum + ex.calories, 0);
  const totalRow = document.createElement('tr');
  totalRow.className = 'total';
  totalRow.innerHTML = `
    <td>合计</td>
    <td></td>
    <td>${D.exercises.reduce((s, e) => s + e.duration, 0)} 分钟</td>
    <td class="calories" style="font-size:16px">~${totalEx} kcal</td>
  `;
  tbody.appendChild(totalRow);

  /* ===== Initial chart render ===== */
  refreshCharts();
})();
</script>
</body>
</html>
