<!DOCTYPE html>
<html lang="zh-CN" data-theme="dark">
<head>
<meta charset="UTF-8">
<script>(function(){var t=localStorage.getItem('fitness-theme');if(t)document.documentElement.setAttribute('data-theme',t);})()</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>健身周度趋势报告</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<style>
  /* ===== Dark theme (default) ===== */
  :root, [data-theme="dark"] {
    --bg: #1c1c1e;
    --bg-card: #2c2c2e;
    --bg-inner: #1c1c1e;
    --text: #fafafa;
    --text-secondary: #a1a1aa;
    --text-muted: #71717a;
    --border: #27272a;
    --border-strong: #3f3f46;
    --accent-red: #ff375f;
    --accent-green: #30d158;
    --accent-blue: #00c7be;
    --accent-orange: #ff8f3e;
    --accent-purple: #7c3aed;
    --accent-teal: #14b8a6;
    --glow-red: rgba(255, 55, 95, 0.4);
    --glow-green: rgba(48, 209, 88, 0.4);
    --glow-blue: rgba(0, 199, 190, 0.4);
    --glow-orange: rgba(255, 143, 62, 0.4);
    --glow-purple: rgba(124, 58, 237, 0.4);
    --badge-text-white: #ffffff;
    --chart-grid: #27272a;
    --chart-tooltip-bg: #1c1c1e;
    --chart-tooltip-text: #fafafa;
    --shadow-card: rgba(0,0,0,0.35);
    --shadow-card-hover: rgba(0,0,0,0.45);
    --theme-icon-fill: #fafafa;
    --theme-btn-bg: rgba(255,255,255,0.08);
    --theme-btn-hover: rgba(255,255,255,0.16);
  }

  /* ===== Light theme ===== */
  [data-theme="light"] {
    --bg: #f5f5f7;
    --bg-card: #ffffff;
    --bg-inner: #f0f0f2;
    --text: #1c1c1e;
    --text-secondary: #6e6e73;
    --text-muted: #8e8e93;
    --border: #e5e5ea;
    --border-strong: #d1d1d6;
    --accent-red: #e5243d;
    --accent-green: #24a853;
    --accent-blue: #009e96;
    --accent-orange: #d97a2e;
    --accent-purple: #6d28d9;
    --accent-teal: #0f9488;
    --glow-red: rgba(229, 36, 61, 0.25);
    --glow-green: rgba(36, 168, 83, 0.25);
    --glow-blue: rgba(0, 158, 150, 0.25);
    --glow-orange: rgba(217, 122, 46, 0.25);
    --glow-purple: rgba(109, 40, 217, 0.25);
    --badge-text-white: #1c1c1e;
    --chart-grid: #e5e5ea;
    --chart-tooltip-bg: #ffffff;
    --chart-tooltip-text: #1c1c1e;
    --shadow-card: rgba(0,0,0,0.06);
    --shadow-card-hover: rgba(0,0,0,0.12);
    --theme-icon-fill: #1c1c1e;
    --theme-btn-bg: rgba(0,0,0,0.06);
    --theme-btn-hover: rgba(0,0,0,0.12);
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: "Space Grotesk", "Noto Sans SC", "PingFang SC", "Microsoft YaHei", sans-serif;
    background: var(--bg);
    color: var(--text);
    padding: 24px;
    min-height: 100vh;
    transition: background 0.3s, color 0.3s;
  }
  .container { max-width: 1200px; margin: 0 auto; }

  /* Theme toggle */
  .theme-toggle {
    display: flex;
    align-items: center;
    gap: 8px;
    cursor: pointer;
    padding: 8px 14px;
    border-radius: 12px;
    border: 1px solid var(--border);
    background: var(--theme-btn-bg);
    transition: background 0.2s, border-color 0.3s;
    user-select: none;
    font-family: "Noto Sans SC", sans-serif;
    font-size: 13px;
    color: var(--text-secondary);
  }
  .theme-toggle:hover { background: var(--theme-btn-hover); }
  .theme-toggle svg {
    width: 18px; height: 18px;
    fill: var(--theme-icon-fill);
    transition: transform 0.4s, fill 0.3s;
  }
  .theme-toggle:hover svg { transform: rotate(30deg); }
  [data-theme="light"] .theme-toggle svg { transform: rotate(0deg); }
  [data-theme="light"] .theme-toggle:hover svg { transform: rotate(-30deg); }

  /* Header */
  .header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
    gap: 12px;
  }
  .header-left { display: flex; flex-direction: column; gap: 4px; }
  .header-right { display: flex; align-items: center; gap: 12px; }
  .header h1 {
    font-family: "Space Grotesk", "Noto Sans SC", sans-serif;
    font-size: 32px;
    font-weight: 700;
    letter-spacing: -0.02em;
    text-shadow: 0 0 20px var(--glow-green);
    transition: text-shadow 0.3s;
  }
  [data-theme="light"] .header h1 { text-shadow: none; }
  .header .subtitle { color: var(--text-secondary); font-size: 15px; font-family: "Noto Sans SC", sans-serif; }
  .header .goal-badge {
    padding: 6px 18px;
    border-radius: 100px;
    font-size: 14px;
    font-weight: 700;
    font-family: "Noto Sans SC", sans-serif;
    color: var(--badge-text-white);
    transition: background 0.3s, border-color 0.3s, box-shadow 0.3s;
  }
  .goal-badge.cut { background: rgba(0, 199, 190, 0.15); border: 1px solid rgba(0, 199, 190, 0.5); box-shadow: 0 0 16px rgba(0, 199, 190, 0.25), inset 0 0 8px rgba(0, 199, 190, 0.15); }
  .goal-badge.bulk { background: rgba(255, 143, 62, 0.15); border: 1px solid rgba(255, 143, 62, 0.5); box-shadow: 0 0 16px rgba(255, 143, 62, 0.25), inset 0 0 8px rgba(255, 143, 62, 0.15); }
  .goal-badge.maintain { background: rgba(48, 209, 88, 0.15); border: 1px solid rgba(48, 209, 88, 0.5); box-shadow: 0 0 16px rgba(48, 209, 88, 0.25), inset 0 0 8px rgba(48, 209, 88, 0.15); }

  /* Summary cards */
  .summary-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(170px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }
  .summary-card {
    background: var(--bg-card);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 4px 16px var(--shadow-card);
    border: 1px solid var(--border);
    transition: transform 0.15s, box-shadow 0.15s, background 0.3s, border-color 0.3s;
  }
  .summary-card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px var(--shadow-card-hover); }
  .summary-card .label { font-size: 13px; color: var(--text-secondary); margin-bottom: 6px; font-family: "Noto Sans SC", sans-serif; transition: color 0.3s; }
  .summary-card .value { font-size: 30px; font-weight: 700; line-height: 1.1; font-family: "Space Grotesk", "IBM Plex Sans", sans-serif; font-variant-numeric: tabular-nums; letter-spacing: -0.02em; transition: color 0.3s, text-shadow 0.3s; }
  .summary-card .unit { font-size: 14px; font-weight: 400; color: var(--text-muted); margin-left: 2px; transition: color 0.3s; }
  .summary-card .sub { font-size: 12px; color: var(--text-muted); margin-top: 6px; font-family: "Noto Sans SC", sans-serif; transition: color 0.3s; }
  .summary-card .trend-up { color: var(--accent-green); text-shadow: 0 0 12px var(--glow-green); }
  .summary-card .trend-down { color: var(--accent-red); text-shadow: 0 0 12px var(--glow-red); }
  .summary-card.deficit .value { color: var(--accent-green); text-shadow: 0 0 18px var(--glow-green); }
  .summary-card.protein .value { color: var(--accent-green); text-shadow: 0 0 18px var(--glow-green); }
  .summary-card.weight .value { color: var(--accent-orange); text-shadow: 0 0 18px var(--glow-orange); }
  .summary-card.steps .value { color: var(--text); text-shadow: 0 0 18px rgba(255,255,255,0.08); }
  .summary-card.training .value { color: var(--accent-blue); text-shadow: 0 0 18px var(--glow-blue); }
  [data-theme="light"] .summary-card .value { text-shadow: none; }
  [data-theme="light"] .summary-card.steps .value { text-shadow: none; }

  /* Chart grid */
  .chart-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 20px;
    margin-bottom: 24px;
  }
  @media (max-width: 768px) { .chart-grid { grid-template-columns: 1fr; } }
  .chart-card {
    background: var(--bg-card);
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 4px 16px var(--shadow-card);
    border: 1px solid var(--border);
    transition: background 0.3s, border-color 0.3s;
  }
  .chart-card h3 { font-size: 16px; font-weight: 700; margin-bottom: 16px; font-family: "Noto Sans SC", sans-serif; color: var(--text); transition: color 0.3s; }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-wrapper { position: relative; height: 300px; }

  /* Daily detail table */
  .detail-table { width: 100%; border-collapse: collapse; }
  .detail-table th {
    text-align: center;
    font-size: 13px;
    color: var(--text-muted);
    padding: 12px 8px;
    border-bottom: 2px solid var(--border-strong);
    white-space: nowrap;
    font-weight: 500;
    font-family: "Noto Sans SC", sans-serif;
    transition: color 0.3s, border-color 0.3s;
  }
  .detail-table td {
    padding: 12px 8px;
    border-bottom: 1px solid var(--border);
    font-size: 14px;
    text-align: center;
    font-variant-numeric: tabular-nums;
    transition: border-color 0.3s;
  }
  .detail-table tr:last-child td { border-bottom: none; }
  .detail-table td.day { font-weight: 700; text-align: left; color: var(--text); }
  .badge {
    display: inline-block;
    padding: 3px 9px;
    border-radius: 6px;
    font-size: 12px;
    font-weight: 700;
    font-family: "Space Grotesk", sans-serif;
  }
  .badge-green { background: var(--glow-green); color: var(--accent-green); }
  .badge-amber { background: var(--glow-orange); color: var(--accent-orange); }
  .badge-red { background: var(--glow-red); color: var(--accent-red); }
  .badge-gray { background: var(--border-strong); color: var(--text-muted); }
  .badge-blue { background: var(--glow-blue); color: var(--accent-blue); }

  /* Insights */
  .insights {
    background: var(--bg-card);
    border-radius: 20px;
    padding: 24px;
    box-shadow: 0 4px 16px var(--shadow-card);
    border: 1px solid var(--border);
    margin-bottom: 24px;
    transition: background 0.3s, border-color 0.3s;
  }
  .insights h3 { font-size: 16px; font-weight: 700; margin-bottom: 14px; font-family: "Noto Sans SC", sans-serif; color: var(--text); transition: color 0.3s; }
  .insight-item {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    padding: 8px 0;
    font-size: 14px;
    line-height: 1.6;
    font-family: "Noto Sans SC", sans-serif;
  }
  .insight-item .icon { flex-shrink: 0; font-size: 16px; }
  .insight-good .icon { color: var(--accent-green); text-shadow: 0 0 10px var(--glow-green); }
  .insight-warn .icon { color: var(--accent-orange); text-shadow: 0 0 10px var(--glow-orange); }
  .insight-bad .icon { color: var(--accent-red); text-shadow: 0 0 10px var(--glow-red); }
  .insight-info .icon { color: var(--accent-blue); text-shadow: 0 0 10px var(--glow-blue); }
  [data-theme="light"] .insight-item .icon { text-shadow: none; }

  .footer {
    text-align: center;
    color: var(--text-muted);
    font-size: 13px;
    padding-top: 16px;
    font-family: "Noto Sans SC", sans-serif;
    transition: color 0.3s;
  }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <div class="header-left">
      <h1>健身周度趋势报告</h1>
      <span class="subtitle" id="week-range"></span>
    </div>
    <div class="header-right">
      <span class="goal-badge" id="goal-badge"></span>
      <button class="theme-toggle" id="theme-toggle" title="切换明暗主题">
        <svg id="icon-sun" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0V4a1 1 0 0 1 1-1zm0 15a1 1 0 0 1 1 1v1a1 1 0 1 1-2 0v-1a1 1 0 0 1 1-1zm8.66-5a1 1 0 0 1 0 2h-1a1 1 0 1 1 0-2h1zm-15 0a1 1 0 0 1 0 2h-1a1 1 0 1 1 0-2h1zM19.07 4.93a1 1 0 0 1 0 1.41l-.7.71a1 1 0 1 1-1.42-1.42l.71-.7a1 1 0 0 1 1.41 0zM7.05 16.95a1 1 0 0 1 0 1.41l-.7.71a1 1 0 1 1-1.42-1.42l.71-.7a1 1 0 0 1 1.41 0zm12.02 0a1 1 0 0 1-1.41 0l-.71-.7a1 1 0 1 1 1.42-1.42l.7.71a1 1 0 0 1 0 1.41zM7.05 4.93a1 1 0 0 1 1.41 0l.71.7a1 1 0 1 1-1.42 1.42l-.7-.71a1 1 0 0 1 0-1.41zM12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8zm0-2a6 6 0 1 1 0 12 6 6 0 0 1 0-12z"/>
        </svg>
        <svg id="icon-moon" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg" style="display:none">
          <path d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21c2.492 0 4.768-.938 6.502-2.498z"/>
        </svg>
        <span id="theme-label">日间</span>
      </button>
    </div>
  </div>

  <!-- Summary cards -->
  <div class="summary-grid" id="summary-grid"></div>

  <!-- Charts -->
  <div class="chart-grid">
    <!-- Weight trend -->
    <div class="chart-card">
      <h3>体重趋势</h3>
      <div class="chart-wrapper"><canvas id="weight-chart"></canvas></div>
    </div>

    <!-- Daily deficit -->
    <div class="chart-card">
      <h3>每日热量缺口</h3>
      <div class="chart-wrapper"><canvas id="deficit-chart"></canvas></div>
    </div>

    <!-- Protein achievement -->
    <div class="chart-card">
      <h3>蛋白质达成率</h3>
      <div class="chart-wrapper"><canvas id="protein-chart"></canvas></div>
    </div>

    <!-- Steps trend -->
    <div class="chart-card">
      <h3>步数趋势</h3>
      <div class="chart-wrapper"><canvas id="steps-chart"></canvas></div>
    </div>

    <!-- Daily detail table -->
    <div class="chart-card full">
      <h3>每日明细</h3>
      <table class="detail-table">
        <thead>
          <tr>
            <th style="text-align:left">日期</th>
            <th>体重(kg)</th>
            <th>体脂率(%)</th>
            <th>摄入(kcal)</th>
            <th>TDEE(kcal)</th>
            <th>缺口(kcal)</th>
            <th>蛋白质(g)</th>
            <th>步数</th>
            <th>训练</th>
          </tr>
        </thead>
        <tbody id="detail-tbody"></tbody>
      </table>
    </div>
  </div>

  <!-- Insights -->
  <div class="insights">
    <h3>本周洞察</h3>
    <div id="insights-list"></div>
  </div>

  <div class="footer">
    Generated by Fitness Tracker Skill | 数据仅供参考，实际消耗因人而异
  </div>
</div>

<script>
(function() {
  if (typeof Chart === 'undefined') {
    document.body.innerHTML = '<div style="padding:60px;text-align:center;font-family:&quot;Noto Sans SC&quot;,sans-serif;color:var(--text)"><h2>⚠️ 图表库加载失败</h2><p>请检查网络连接后刷新页面</p></div>';
    return;
  }
  const raw = document.getElementById('report-data').textContent;
  const D = JSON.parse(raw);

  /* ===== Theme system ===== */
  const html = document.documentElement;
  const saved = localStorage.getItem('fitness-theme');
  if (saved) html.setAttribute('data-theme', saved);

  function themeColors() {
    const dark = html.getAttribute('data-theme') === 'dark';
    return {
      grid: dark ? '#27272a' : '#e5e5ea',
      tick: dark ? '#71717a' : '#8e8e93',
      gridSubtle: dark ? 'rgba(255,255,255,0.04)' : 'rgba(0,0,0,0.04)',
      legend: dark ? '#a1a1aa' : '#6e6e73',
      tooltipBg: dark ? '#1c1c1e' : '#ffffff',
      tooltipText: dark ? '#fafafa' : '#1c1c1e',
      tooltipBorder: dark ? '#3f3f46' : '#d1d1d6',
      pointBorder: dark ? '#fff' : '#1c1c1e',
      noDataFill: dark ? '#3f3f46' : '#e5e5ea'
    };
  }

  function cssVar(name) {
    return getComputedStyle(document.documentElement).getPropertyValue(name).trim();
  }
  function cssAlpha(name, alpha) {
    return cssVar(name).replace('rgb(', 'rgba(').replace(')', `, ${alpha})`);
  }

  function updateToggleUI() {
    const isDark = html.getAttribute('data-theme') === 'dark';
    document.getElementById('icon-sun').style.display = isDark ? '' : 'none';
    document.getElementById('icon-moon').style.display = isDark ? 'none' : '';
    document.getElementById('theme-label').textContent = isDark ? '日间' : '夜间';
  }
  updateToggleUI();

  document.getElementById('theme-toggle').addEventListener('click', function() {
    const current = html.getAttribute('data-theme');
    const next = current === 'dark' ? 'light' : 'dark';
    html.setAttribute('data-theme', next);
    try { localStorage.setItem('fitness-theme', next); } catch(e) {}
    updateToggleUI();
    refreshCharts();
  });

  /* ===== Header ===== */
  document.getElementById('week-range').textContent = D.weekRange;
  const badge = document.getElementById('goal-badge');
  badge.textContent = D.goal;
  badge.className = 'goal-badge ' + (D.goalType || 'cut');

  /* ===== Summary cards ===== */
  const s = D.summary;
  const latestWeightDay = D.days.filter(d => d.weight != null).pop();
  const weightValue = latestWeightDay ? latestWeightDay.weight : null;
  const weightChangeStr = s.weightChange != null ? (s.weightChange > 0 ? '+' : '') + s.weightChange.toFixed(1) + ' kg' : '';
  const weightSub = latestWeightDay ? `${latestWeightDay.day} ${latestWeightDay.date}` + (weightChangeStr ? '，周变化 ' + weightChangeStr : '') : '数据不足';
  const deficitLabel = s.avgDeficit < 0 ? '赤字' : '盈余';
  const proteinPct = D.proteinTarget > 0 ? Math.round(s.avgProtein / D.proteinTarget * 100) : 0;

  const cards = [
    { label: '平均' + deficitLabel, value: (s.avgDeficit > 0 ? '+' : '') + s.avgDeficit, unit: ' kcal', sub: '日均', cls: 'deficit' },
    { label: '平均蛋白质', value: s.avgProtein, unit: ` / ${D.proteinTarget}g`, sub: `${proteinPct}% 达成`, cls: 'protein' },
    { label: '体重', value: weightValue != null ? weightValue : '—', unit: weightValue != null ? ' kg' : '', sub: weightSub, cls: 'weight' },
    { label: '训练天数', value: s.trainingDays, unit: ' 天', sub: '本周', cls: 'training' },
    { label: '平均步数', value: s.avgSteps.toLocaleString(), unit: ' 步', sub: '日均', cls: 'steps' },
    { label: '体脂率', value: s.bodyFat != null ? s.bodyFat : '—', unit: s.bodyFat != null ? '%' : '', sub: s.bodyFat != null ? 'InBody 实测' : '数据不足', cls: '' }
  ];

  const grid = document.getElementById('summary-grid');
  cards.forEach(c => {
    const div = document.createElement('div');
    div.className = 'summary-card ' + c.cls;
    div.innerHTML = `<div class="label">${c.label}</div><div class="value">${c.value}<span class="unit">${c.unit}</span></div><div class="sub">${c.sub}</div>`;
    grid.appendChild(div);
  });

  /* ===== Chart instances store ===== */
  let chartInstances = {};

  function makeTooltip() {
    const c = themeColors();
    return {
      backgroundColor: c.tooltipBg,
      titleColor: c.tooltipText,
      bodyColor: c.tooltipText,
      borderColor: c.tooltipBorder,
      borderWidth: 1,
      padding: 10,
      cornerRadius: 8
    };
  }

  // Custom plugin: draw data labels on top of bar charts
  const barDataLabels = {
    id: 'barDataLabels',
    afterDatasetsDraw(chart) {
      const { ctx, scales } = chart;
      if (!scales.y) return;
      const zeroY = scales.y.getPixelForValue(0);
      const c = themeColors();

      chart.data.datasets.forEach((dataset, i) => {
        const meta = chart.getDatasetMeta(i);
        if (meta.type !== 'bar') return;

        dataset.data.forEach((value, index) => {
          const bar = meta.data[index];
          if (!bar) return;

          ctx.save();
          ctx.font = '700 11px "Space Grotesk", "Noto Sans SC", sans-serif';
          ctx.textAlign = 'center';

          let text, y;
          if (value == null) {
            text = '—';
            y = zeroY - 8;
            ctx.fillStyle = c.tick;
          } else if (value === 0) {
            text = '0';
            y = zeroY - 8;
            ctx.fillStyle = cssVar('--accent-blue');
          } else {
            text = String(value);
            const bg = Array.isArray(dataset.backgroundColor)
              ? dataset.backgroundColor[index]
              : dataset.backgroundColor;
            ctx.fillStyle = bg || c.legend;
            if (value > 0) y = Math.min(bar.y, bar.base) - 6;
            else y = Math.max(bar.y, bar.base) + 14;
          }

          ctx.fillText(text, bar.x, y);
          ctx.restore();
        });
      });
    }
  };

  function refreshCharts() {
    const c = themeColors();
    // Destroy old charts
    Object.values(chartInstances).forEach(ch => ch.destroy());
    chartInstances = {};

    Chart.defaults.color = c.legend;
    Chart.defaults.borderColor = c.grid;

    const labels = D.days.map(d => d.date ? [d.day, d.date] : [d.day]);

    // 1. Weight trend
    chartInstances.weight = new Chart(document.getElementById('weight-chart'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: '体重 (kg)',
          data: D.days.map(d => d.weight),
          borderColor: cssVar('--accent-orange'),
          fill: false,
          tension: 0.4,
          borderWidth: 2,
          pointRadius: 2.5,
          pointHoverRadius: 6,
          pointBackgroundColor: cssVar('--accent-orange'),
          pointBorderColor: c.pointBorder,
          pointBorderWidth: 1.5,
          spanGaps: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: Object.assign({}, makeTooltip(), { callbacks: { label: ctx => ctx.raw != null ? `${ctx.raw} kg` : '无数据' } })
        },
        scales: {
          y: { grid: { color: c.gridSubtle }, ticks: { color: c.tick, font: { size: 11 } } },
          x: { grid: { display: false }, ticks: { color: c.legend, font: { size: 11 } } }
        }
      }
    });

    // 2. Daily deficit
    chartInstances.deficit = new Chart(document.getElementById('deficit-chart'), {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [{
          label: '热量缺口',
          data: D.days.map(d => d.deficit),
          backgroundColor: D.days.map(d => {
            if (d.deficit == null) return c.noDataFill;
            if (d.deficit < 0) return cssVar('--accent-green');
            if (d.deficit > 0) return cssVar('--accent-orange');
            return cssVar('--accent-blue');
          }),
          borderRadius: 6,
          barPercentage: 0.7
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: Object.assign({}, makeTooltip(), { callbacks: { label: ctx => ctx.raw != null ? (ctx.raw === 0 ? '0 kcal（收支平衡）' : (ctx.raw > 0 ? '+' : '') + ctx.raw + ' kcal') : '无数据' } })
        },
        scales: {
          y: { grid: { color: c.grid }, ticks: { color: c.tick, font: { size: 12 }, callback: v => v + ' kcal' } },
          x: { grid: { display: false }, ticks: { color: c.legend, font: { size: 12 } } }
        }
      },
      plugins: [barDataLabels]
    });

    // 3. Protein achievement
    chartInstances.protein = new Chart(document.getElementById('protein-chart'), {
      type: 'bar',
      data: {
        labels: labels,
        datasets: [
          {
            label: '实际摄入',
            data: D.days.map(d => d.protein),
            backgroundColor: D.days.map(d => {
              if (d.protein == null) return c.noDataFill;
              const pct = D.proteinTarget > 0 ? d.protein / D.proteinTarget : 0;
              if (pct >= 1) return cssVar('--accent-green');
              if (pct >= 0.8) return cssVar('--accent-orange');
              return cssVar('--accent-red');
            }),
            borderRadius: 6
          },
          {
            label: '目标',
            data: D.days.map(() => D.proteinTarget),
            type: 'line',
            borderColor: cssVar('--accent-blue'),
            borderWidth: 2,
            borderDash: [5, 5],
            pointRadius: 0,
            fill: false
          }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { position: 'bottom', labels: { color: c.legend, boxWidth: 12, padding: 10, font: { size: 12 } } },
          tooltip: Object.assign({}, makeTooltip(), { callbacks: { label: ctx => ctx.raw != null ? ctx.dataset.label + ': ' + ctx.raw + 'g' : '无数据' } })
        },
        scales: {
          y: { beginAtZero: true, grid: { color: c.grid }, ticks: { color: c.tick, font: { size: 12 }, callback: v => v + 'g' } },
          x: { grid: { display: false }, ticks: { color: c.legend, font: { size: 12 } } }
        }
      },
      plugins: [barDataLabels]
    });

    // 4. Steps trend
    chartInstances.steps = new Chart(document.getElementById('steps-chart'), {
      type: 'line',
      data: {
        labels: labels,
        datasets: [{
          label: '步数',
          data: D.days.map(d => d.steps),
          borderColor: cssVar('--accent-blue'),
          fill: false,
          tension: 0.4,
          borderWidth: 2,
          pointRadius: 2.5,
          pointHoverRadius: 6,
          pointBackgroundColor: cssVar('--accent-blue'),
          pointBorderColor: c.pointBorder,
          pointBorderWidth: 1.5,
          spanGaps: true
        }]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: {
          legend: { display: false },
          tooltip: Object.assign({}, makeTooltip(), { callbacks: { label: ctx => ctx.raw != null ? ctx.raw.toLocaleString() + ' 步' : '无数据' } })
        },
        scales: {
          y: { beginAtZero: true, grid: { color: c.gridSubtle }, ticks: { color: c.tick, font: { size: 11 }, callback: v => v.toLocaleString() } },
          x: { grid: { display: false }, ticks: { color: c.legend, font: { size: 11 } } }
        }
      }
    });
  }

  /* ===== Detail table ===== */
  const tbody = document.getElementById('detail-tbody');
  D.days.forEach(d => {
    const hasData = d.intake != null;
    const proteinPct = d.protein != null && D.proteinTarget > 0 ? Math.round(d.protein / D.proteinTarget * 100) : null;
    let proteinBadge = 'badge-gray';
    let proteinText = '—';
    if (proteinPct != null) {
      proteinText = `${d.protein} (${proteinPct}%)`;
      if (proteinPct < 80) proteinBadge = 'badge-red';
      else if (proteinPct < 100) proteinBadge = 'badge-amber';
      else proteinBadge = 'badge-green';
    }

    let deficitText = '—';
    let deficitBadge = 'badge-gray';
    if (d.deficit != null) {
      if (d.deficit > 0) { deficitText = '+' + d.deficit; deficitBadge = 'badge-amber'; }
      else if (d.deficit === 0) { deficitText = '0（平衡）'; deficitBadge = 'badge-blue'; }
      else { deficitText = d.deficit; deficitBadge = 'badge-green'; }
    }

    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="day">${d.day} ${d.date}</td>
      <td>${d.weight != null ? d.weight : '—'}</td>
      <td>${d.bodyFat != null ? d.bodyFat : '—'}</td>
      <td>${d.intake != null ? d.intake : '—'}</td>
      <td>${d.tdee != null ? d.tdee : '—'}</td>
      <td><span class="badge ${deficitBadge}">${deficitText}</span></td>
      <td><span class="badge ${proteinBadge}">${proteinText}</span></td>
      <td>${d.steps != null ? d.steps.toLocaleString() : '—'}</td>
      <td>${d.trained ? '✓' : '—'}</td>
    `;
    tbody.appendChild(tr);
  });

  /* ===== Insights ===== */
  const insightsList = document.getElementById('insights-list');
  const iconMap = {
    good: { icon: '✓', color: 'var(--accent-green)', cls: 'insight-good' },
    warn: { icon: '▲', color: 'var(--accent-orange)', cls: 'insight-warn' },
    bad: { icon: '✕', color: 'var(--accent-red)', cls: 'insight-bad' },
    info: { icon: 'ℹ', color: 'var(--accent-blue)', cls: 'insight-info' }
  };
  D.insights.forEach(ins => {
    const m = iconMap[ins.type] || iconMap.info;
    const div = document.createElement('div');
    div.className = 'insight-item ' + m.cls;
    div.innerHTML = `<span class="icon">${m.icon}</span><span>${ins.text}</span>`;
    insightsList.appendChild(div);
  });

  /* ===== Initial chart render ===== */
  refreshCharts();
})();
</script>
</body>
</html>
